logging:
  level:
    com.alibaba.nacos.client.config.impl.ClientWorker: WARN
spring:
  application:
    name: ye-ai-code-mother-backend
  profiles:
    # 激活本地环境
    active: local
  data:
    redis:
      host: localhost
      port: 6379
      ttl: 3600
      database: 0
  session:
    store-type: redis
    timeout: 2592000
  config:
    import:
      - nacos:prompt-safety-config.yaml?group=AI_CODE_GENERATE&refresh=true
  cloud:
    nacos:
      config:
        server-addr: 127.0.0.1:8848
        group: AI_CODE_GENERATE
        file-extension: yaml
        enabled: true

  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ye_ai_code_mother
    username: root
    password: 123456

server:
  port: 8123
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.ye.yeaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

